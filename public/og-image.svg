<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f9fffe"/>
  <rect width="1200" height="4" fill="#17b5f2"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d4cfc8" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo text -->
  <text x="100" y="240" font-family="sans-serif" font-size="72" font-weight="800" fill="#252021" letter-spacing="-2">NG</text>
  <text x="196" y="240" font-family="sans-serif" font-size="72" font-weight="800" fill="#17b5f2">.</text>
  <text x="218" y="240" font-family="sans-serif" font-size="72" font-weight="800" fill="#252021">Consulting</text>
  <!-- Tagline -->
  <text x="100" y="310" font-family="sans-serif" font-size="28" font-weight="400" fill="#3d3839">Digitální skupina pro váš online růst</text>
  <!-- Divider -->
  <rect x="100" y="350" width="80" height="4" fill="#17b5f2" rx="2"/>
  <!-- Sub text -->
  <text x="100" y="410" font-family="sans-serif" font-size="20" fill="#3d3839" opacity="0.7">Weby · E-mailing · Lokální komunity · Liberec</text>
  <!-- Domain -->
  <text x="100" y="530" font-family="sans-serif" font-size="18" font-weight="600" fill="#17b5f2">ngconsulting.cz</text>
</svg>
